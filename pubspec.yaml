name: ai_assistant
description: AI对话助手 — 类似豆包，支持预设定时任务
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # 状态管理
  flutter_riverpod: ^2.5.1

  # 本地存储（JSON文件，零代码生成）
  path_provider: ^2.1.3

  # 网络请求
  dio: ^5.4.3+1

  # 任务调度
  workmanager: ^0.5.2

  # 通知
  flutter_local_notifications: ^17.2.1+2

  # 语音
  speech_to_text: ^6.6.2
  flutter_tts: ^4.0.2

  # UI
  intl: ^0.19.0
  gap: ^3.0.1
  cupertino_icons: ^1.0.8
  flutter_markdown: ^0.7.1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0

  # 工具
  uuid: ^4.4.0
  shared_preferences: ^2.2.3
  flutter_svg: ^2.0.10+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
